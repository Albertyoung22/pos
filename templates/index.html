<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sip & Savor 點餐系統 | 頂級飲品體驗</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header>
        <div class="logo">
            <i class="fas fa-mug-hot"></i>
            <span>品味茶飲</span>
        </div>
        <nav>
            <a href="/intro" class="category-btn" style="text-decoration: none; margin-right: 10px;">
                <i class="fas fa-magic"></i> 智慧介紹
            </a>
            <a href="/admin" class="category-btn" style="text-decoration: none;">
                <i class="fas fa-chart-line"></i> 營收報表
            </a>
        </nav>
    </header>

    <main class="container">
        <section class="menu-section">
            <div id="category-container" class="categories">
                <!-- Fetch categories from API -->
            </div>
            <div id="product-container" class="products-grid">
                <!-- Fetch products from API -->
            </div>
        </section>

        <aside class="cart-section glass">
            <div class="cart-header">
                <h3>當前訂單</h3>
                <span id="item-count" class="category-btn" style="padding: 4px 12px; font-size: 0.8rem;">0 項目</span>
            </div>

            <div id="cart-items" class="cart-items">
                <!-- Dynamic cart content -->
            </div>

            <div class="cart-footer">
                <div class="total-row">
                    <span>總計</span>
                    <span id="total-price">$0</span>
                </div>
                <button id="checkout-btn" class="checkout-btn" disabled>
                    確認結帳
                </button>
            </div>
        </aside>
    </main>

    <script src="/static/js/main.js"></script>
</body>

</html>
